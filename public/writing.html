<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScenarijPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/writing.css" rel="stylesheet"/>
</head>
<body>
  <div id="zaglavlje">
    <button id="strelicaLijevo" onclick="history.back()">←</button>
    <div id="title">
      <h2 id="naslov-scenarija"></h2>
    </div>
    <div class="dugmad">
      <div id="dugmad2">
        
        <input type="button" class="dugme" id="dugmeScena" value="SCENA">
        <input type="button" class="dugme" id="dugmeAkcija" value="AKCIJA">
        <input type="button" class="dugme" id="dugmeLik" value="LIK">
        <input type="button" class="dugme" id="dugmeDijalog" value="DIJALOG">
      </div>
      <div class="dugmeSave">
        <input type="button" class="dugme" id="dugmeSpasi" value="✓  SPASI">
      </div>
    </div>
  </div>

  <div id="glavni-meni">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-titl">Scene (1)</h3>
        <ul class="scena-lista">
          <li class="scena-item active">
            <div class="scena-sadrzaj">
               <div class="scena-gornji-red">
                <span class="scena-broj">1.</span>
                <span class="scena-titl" id="sidebarTitle1"></span>
              </div>
              <div class="scena-pages">(1/8)</div> 
            </div>
          </li>
          <!--
          <li class="scena-item">
            <div class="scena-sadrzaj">
               <div class="scena-gornji-red">
                <span class="scena-broj">2.</span>
                <span class="scena-titl" id="sidebarTitle2">EXT./INT. BOARDING HOUSE. NYC. DAY. 1868.</span>
              </div>
              <div class="scena-pages">(3/8)</div> 
            </div>
          </li>
          <li class="scena-item">
            <div class="scena-sadrzaj">
               <div class="scena-gornji-red">
                <span class="scena-broj">3.</span>
                <span class="scena-titl" id="sidebarTitle3">EXT. FRANCE. PARIS. DAY. 1868.</span>
              </div>
              <div class="scena-pages">(2/8)</div> 
            </div>
          </li>
        -->
        </ul>
        <hr class="linija">
      </div>
    </div>

    <!-- Editor -->
    <main id="editor">

       <!--dugmad za one funkcije-->
      <div id="modul-kontrole"> 
        
        <input type="button" class="dugme" id="dugmeBrojRijeci" value="Broj Riječi">
        <input type="button" class="dugme" id="dugmeDajUloge" value="Daj Uloge">
        <input type="button" class="dugme" id="dugmePogresnaUloga" value="Pogresna uloga">
        <input type="button" class="dugme" id="dugmeBrojLinijaTeksta" value="Broj Linija Teksta">

          <!--input forma za ulogu koja je potrebna za dajBrojLinijaTeksta dugme-->
         <div class="kontrola-uloge">
            <input type="text" id="inputUloga" placeholder="Ime uloge..." class="input-tekst">
        </div>

        <input type="button" class="dugme" id="dugmeScenarijUloge" value="Scenarij Uloge">
        <input type="button" class="dugme" id="dugmeGrupisiUloge" value="Grupisi Uloge">
        <!--dugmad za formatiranje-->
        <input type="button" class="dugme" id="dugmeBold" value="Bold">
        <input type="button" class="dugme" id="dugmeItalic" value="Italic">
        <input type="button" class="dugme" id="dugmeUnderline" value="Underline">
      </div>
      <!--NOVO-->
      <div class="sekundarni-kontrolni-red">
          
          <div id="character-change-container">
            
            <div id="step-1-lock" class="char-control-row">
                <label for="old-char-name">Promjena imena:</label>
                <input type="text" id="old-char-name" placeholder="STARO IME">
                <button id="btn-lock-char" class="dugme">Zaključaj</button>
            </div>

            <div id="step-2-update" class="char-control-row" style="display: none;">
                <strong>Mijenjamo: <span id="display-old-name" style="color: #D68A00;"></span></strong>
                <input type="text" id="new-char-name" placeholder="NOVO IME">
                <button id="btn-update-char" class="dugme dugme-zeleno">Sačuvaj</button>
                <button id="btn-cancel-char" class="dugme">Odustani</button>
            </div>

          </div>

          <div id="delta-check-container">
            <div class="char-control-row">
              <label for="delta-since-input">Izmjene od:</label>
              <input type="datetime-local" id="delta-since-input">
              <button id="btn-get-deltas" class="dugme">Provjeri</button>
          </div>
    </div>

      </div>
      <div id="poruke">
      </div>
      <div class="editor-sadrzaj">
         <div id="divEditor"> 
         </div>
      </div>
    </main>
  </div>
<script src="js/PoziviAjaxFetch.js"></script> 
<script src="js/EditorTeksta.js"></script>
<script src="js/editor.js"></script>
<script src="js/editorWriting.js"></script>
</body>
</html>
