<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ScenarijPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/projects.css" rel="stylesheet"/>
</head>
<body>
    <div class="lijevo-sidebar">
        <div class="title">
        <h1 id="title">ScenarijPro</h1>
        </div>
        <div class="sidebar-opcije">
            <div class="sidebar-opcija" id="sidebar-opcija1">
                <h4>Projekti</h4>
            </div>
        </div>
        <hr id="sidebar-linija">
        <div class="sidebar-user-mini-profil">
            <div id="ikona">U</div>
            <div class="sidebar-user-mini-profil-tekst">
            <h5>Korisnik</h5>
            <h6>Pro member</h6>
            </div>
        </div>
    </div>
    <div id="glavni-meni">
            <div id="zaglavlje">
               <h1>Svi scenariji</h1> 
               <div class="input-forme">
                    <input type="text" id="pretraga" name="pretraga" value="Pretraga">
                    <input type="button" id="dugmeNoviProjekat" name="dugme" value="+ Novi projekat" onclick="prikaziUnos()">
               </div>
            </div>
            
            <div id="mreza">
                <div class="kartica add-card" id="card-new">
                    <div id="view-initial" onclick="prikaziUnos()" style="width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                        <h4>+</h4>
                        <p>Kreiraj novi scenarij</p>
                    </div>
            
                    <div id="view-form" style="display: none; width: 100%;">
                        <input type="text" id="novi-naslov" placeholder="Naziv scenarija..." />
                        <div class="buttons">
                            <button onclick="sacuvajNovi(event)" class="btn-save">Kreiraj</button>
                            <button onclick="ponistiUnos(event)" class="btn-cancel">X</button>
                        </div>
                    </div>
                </div>
                </div>
    </div>
    <script src="js/PoziviAjaxFetch.js"></script>
    <script>
        // Logika za učitavanje podataka o scenariju (Naslov)
        const kartica = document.getElementById('kartica1');
       

    document.addEventListener("DOMContentLoaded", () => {
        osvjeziVrijemeZadnjeIzmjene(1, "last-edit-1");
    });

    // Funkcija prilagođena novom (status, data) formatu
    function osvjeziVrijemeZadnjeIzmjene(scenarioId, elementId) {
        const element = document.getElementById(elementId);
        if (!element) return; 

        // Pozivamo getDeltas sa (status, data) callback-om
        PoziviAjaxFetch.getDeltas(scenarioId, 0, (status, data) => {
            
            // Provjera statusa umjesto err
            if (status !== 200) {
                console.error("Greška pri dohvatanju deltas:", data);
                element.innerText = "Greška";
                return;
            }

            // Ako je status 200, logika se nastavlja
            if (!data || !data.deltas || data.deltas.length === 0) {
                element.innerText = "Nema izmjena";
                return;
            }

            // Pronalazak najnovije izmjene
            const zadnjaIzmjena = data.deltas.reduce((najnoviji, trenutni) => {
                return (trenutni.timestamp > najnoviji.timestamp) ? trenutni : najnoviji;
            }, data.deltas[0]);

            const timestampServer = zadnjaIzmjena.timestamp;
            const timestampSad = Math.floor(Date.now() / 1000); 
            const razlikaSekunde = timestampSad - timestampServer;
            const razlikaSati = Math.floor(razlikaSekunde / 3600);

            if(razlikaSati < 1){
                const razlikaMinute = Math.floor(razlikaSekunde / 60);
                if(razlikaMinute < 2){
                    element.innerText = "Upravo sada";
                } else {
                    element.innerText = `Prije ${razlikaMinute} min`;
                }
            } else if(razlikaSati === 1) {
                element.innerText = "Prije 1 sat";
            } else if(razlikaSati < 24) {
                element.innerText = `Prije ${razlikaSati} sati`;
            } else {
                const dana = Math.floor(razlikaSati / 24);
                element.innerText = `Prije ${dana} dana`;
            }
        });
    }

   function prikaziUnos() {
    document.getElementById("view-initial").style.display = "none";
    document.getElementById("view-form").style.display = "block";
    document.getElementById("novi-naslov").focus(); 
}

function ponistiUnos(event) {
    if(event) event.stopPropagation(); 
    document.getElementById("novi-naslov").value = "";
    document.getElementById("view-initial").style.display = "flex";
    document.getElementById("view-form").style.display = "none";
}

function sacuvajNovi(event) {
    if(event) event.stopPropagation();

    const naslovInput = document.getElementById("novi-naslov");
    const naslov = naslovInput.value;

    const trenutniUserId = localStorage.getItem('trenutniUserId');
    if (!trenutniUserId) {
        alert("Greška: Korisnik nije prijavljen!");
        return;
    }
    if (!naslov) return alert("Unesite naslov!");

    PoziviAjaxFetch.postScenario(naslov, trenutniUserId, (status, data) => {
        if (status === 200) {
            console.log("Scenario uspješno kreiran i povezan!");
            ponistiUnos();
            dodajKarticuNaEkran(data);
        } else {
            alert("Greška: " + (data.message || status));  
        }
    });
}

function dodajKarticuNaEkran(scenarij) {
    const container1 = document.getElementById("mreza");
    const addCard1 = document.getElementById("card-new");

    const novaKartica = document.createElement("div");
    novaKartica.className = "kartica active"; 
    novaKartica.id = `kartica-${scenarij.id}`;
    
    // Klik na karticu vodi na editor (writing.html)
    novaKartica.onclick = function() {
        localStorage.setItem('trenutniScenarioId', scenarij.id);
        window.location.href = `writing.html?id=${scenarij.id}`;
    };

    // Dinamički računamo broj linija (ako su podaci dostupni)
    //const brojLinija = (scenarij.Lines) ? scenarij.Lines.length : 0;
    novaKartica.innerHTML = `
        <div class="kartica-zaglavlje">
            <div class="kartica-zaglavlje-gornjaLinija">
                <h4>${scenarij.title}</h4>
            </div>
            <p>ID projekta: ${scenarij.id}</p>
        </div>
        <div class="kartica-mini-container">
            <div class="kartica-mini-container-linija">
                <p class="kartica-mini-title">Status: </p><p>...</p>
            </div>
            <div class="kartica-mini-container-linija">
                <p class="kartica-mini-title">Pages: </p><p>0</p>
            </div>
            <div class="kartica-mini-container-linija">
                <p class="kartica-mini-title">Created: </p><p>Just now</p>
            </div>
        </div>
    `;
    container1.insertBefore(novaKartica, addCard1);

    // Odmah pokreni učitavanje zadnje izmjene za ovu karticu
    osvjeziVrijemeZadnjeIzmjene(scenarij.id, `edit-${scenarij.id}`);
}

document.addEventListener('DOMContentLoaded', () => {
    const userId = localStorage.getItem('trenutniUserId');
    //const listaProjekata = document.getElementById('listaProjekata'); 

    if (!userId) {
        alert("Niste prijavljeni!");
        window.location.href = 'login.html';
        return;
    }
    const ikona = document.getElementById('ikona');
    const imeUsera = document.querySelector('.sidebar-user-mini-profil-tekst h5');
    const userName = localStorage.getItem('trenutnoIme');// || 'Korisnik';
    if (ikona) ikona.innerText = userName.charAt(0).toUpperCase();

    ucitajSveScenarije(userId);

});
function ucitajSveScenarije(userId) {
    const mreza = document.getElementById('mreza');
    const addCard = document.getElementById('card-new');

    // Brišemo sve stare kartice osim one za dodavanje novog
    const trenutneKartice = mreza.querySelectorAll('.kartica:not(.add-card)');
    trenutneKartice.forEach(k => k.remove());

    fetch(`/api/users/${userId}/scenarios`)
        .then(res => res.json())
        .then(scenariji => {
            if (scenariji.length === 0) {
                console.log("Korisnik nema scenarija.");
                return;
            }

            // Za svaki scenario kreiramo karticu
            scenariji.forEach(s => {
                dodajKarticuNaEkran(s);
            });
        })
        .catch(err => console.error("Greška pri dohvatanju:", err));
}

function otvoriScenario(id) {
    // Spremi ID scenarija i idi na editor stranicu
    localStorage.setItem('trenutniScenarioId', id);
    window.location.href = 'editor.html';
}
</script>
</body>
</html>
