<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zadatak 3 User forma</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/user.css" rel="stylesheet"/>
</head>
<body>
  <div id="user-meni">
        <!--Zaglavlje-->
        <div id="zaglavlje">
            <h1>Postavke korisničkog računa</h1>
            <p>Upravljajte vašim korisničkim računom, sigurnosnim postavkama i notifikacijama</p>
            <hr id="user-linija">
        </div>
        
        <!-- Podaci o korisničkom računu -->
        <div id="acc-info" class="section">
            <h4>Podaci o korisničkom računu</h4>
            
            <div class="form-grupa">
                <label for="ime">Ime i prezime</label>
                <input type="text" id="ime" value="John Doe">
            </div>
            
            <div class="form-grupa">
                <label for="email">Email adresa</label>
                <input type="text" id="email" value="john.doe@example.com">
            </div>
            
            <div class="form-grupa">
                <label for="items">Broj elemenata po stranici (1-100)</label>
                <input type="number" id="items" min="1" max="100" value="25">
            </div>
        </div>
        
        <!-- Sigurnosne postavke -->
        <div id="sec-info" class="section">
            <h4>Sigurnosne postavke</h4>
            
            <div class="form-grupa">
                <label for="sifra">Nova šifra</label>
                <input type="password" id="sifra" placeholder="********">    
            </div>
            <p class="hint">Ostavite prazno da zadržite trenutnu šifru.</p>
            
            <div class="checkbox-container">
                <input type="checkbox" id="2FA">
                <label for="2FA">Omogući Two-Factor Authentication (2FA)</label>
            </div>
        </div>
        
        <!-- Notifikacije -->
        <div id="notif-pref" class="section">
            <h4>Notifikacije</h4>
            
            <div class="form-grupa">
                <label>Preferirani način komunikacije</label>
                <div class="radio-grupa">
                    <div class="radio-opcija">
                        <input type="radio" id="contactMethod1" name="contactMethod" checked>
                        <label for="contactMethod1">Email</label>
                    </div>
                    <div class="radio-opcija">
                        <input type="radio" id="contactMethod2" name="contactMethod">
                        <label for="contactMethod2">SMS (Text)</label>
                    </div>
                    <div class="radio-opcija">
                        <input type="radio" id="contactMethod3" name="contactMethod">
                        <label for="contactMethod3">None</label>
                    </div>
                </div>
            </div>
            
            <div class="form-grupa">
                <label for="opcije1">Notification Frequency</label>
                <select id="opcije1">
                    <option>Daily</option>
                    <option>Weekly</option>
                    <option>Monthly</option>
                    <option>Never</option>
                </select>
            </div>
        </div>
        <!--Podnozje-->
        <div id="podnozje">
            <hr id="btn-linija">
            <input type="button" id="dugmeSaveChanges" value="Spremi promjene">
        </div>
    </div>
</body>
</html>
