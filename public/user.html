<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zadatak 3 User forma</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/user.css" rel="stylesheet"/>
</head>
<body>
  <div id="user-meni">
        <!--Zaglavlje-->
        <div id="zaglavlje">
            <h1>Postavke korisničkog računa</h1>
            <p>Upravljajte vašim korisničkim računom, sigurnosnim postavkama i notifikacijama</p>
            <hr id="user-linija">
        </div>
        
        <!-- Podaci o korisničkom računu -->
        <div id="acc-info" class="section">
            <h4>Podaci o korisničkom računu</h4>
            
            <div class="form-grupa">
                <label for="ime">Ime i prezime</label>
                <input type="text" id="ime" autocomplete="ime">
            </div>
            
            <div class="form-grupa">
                <label for="email">Email adresa</label>
                <input type="text" id="email" autocomplete="email">
            </div>
            <!--
            <div class="form-grupa">
                <label for="items">Broj elemenata po stranici (1-100)</label>
                <input type="number" id="items" min="1" max="100" value="25">
            </div>
        -->
        </div>
        
        <!-- Sigurnosne postavke -->
        <div id="sec-info" class="section">
            <h4>Sigurnosne postavke</h4>
            
            <div class="form-grupa">
                <label for="password">Nova šifra</label>
                <input type="password" id="password" placeholder="********">    
            </div>
            <p class="hint">Ostavite prazno da zadržite trenutnu šifru.</p>
            <!--
            <div class="checkbox-container">
                <input type="checkbox" id="2FA">
                <label for="2FA">Omogući Two-Factor Authentication (2FA)</label>
            </div>
        -->
        </div>
        
        <!-- Notifikacije -->
        <div id="notif-pref" class="section">
            <h4>Notifikacije</h4>
            
            <div class="form-grupa">
                <label for="opcije1">Notification Frequency</label>
                <select id="opcije1">
                    <option>Daily</option>
                    <option>Weekly</option>
                    <option>Monthly</option>
                    <option>Never</option>
                </select>
            </div>
        </div>
        <!--Podnozje-->
        <div id="podnozje">
            <hr id="btn-linija">
            <input type="button" id="dugmeSaveChanges" value="Spremi promjene">
        </div>
    </div>
    <script src="js/PoziviAjaxFetch.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    console.log("Skripta je učitana!");
    const dugme = document.getElementById('dugmeSaveChanges');

    if (dugme) {
        dugme.addEventListener('click', function() {
            const userData = {
                ime: document.getElementById('ime').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                frequency: document.getElementById('opcije1') ? document.getElementById('opcije1').value : "default"
            };

            console.log("Klik detektovan, šaljem:", userData);

            if (typeof PoziviAjaxFetch !== 'undefined') {
                PoziviAjaxFetch.registrujKorisnika(userData, (status, data) => {
                    if (status === 200 || status === 201) {
                        console.log("Odgovor servera:", data.message);
                        localStorage.setItem('trenutniUserId', data.id);
                        localStorage.setItem('trenutnoIme', data.fullName);
                        window.location.href = 'projects.html';
                    } else {
                        alert("Greška: " + (data.message || status));
                    }
                });
            } else {
                console.error("PoziviAjaxFetch nije učitan! Provjeri putanju u src='js/PoziviAjaxFetch.js'");
            }
        });
    }
});
</script>
</body>
</html>
