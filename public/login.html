<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>ScenarijPro - Prijava</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-kontejner {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
        }
        button:hover { background-color: #34495e; }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; }
        p { margin-top: 20px; font-size: 14px; }
        a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-kontejner">
    <h1>ScenarijPro</h1>
    <p>Prijavite se na svoj račun</p>
    
    <input type="email" id="email" placeholder="Email adresa" required>
    <input type="password" id="password" placeholder="Lozinka" required>
    
    <button onclick="izvrsiPrijavu()">Prijavi se</button>
    <div id="poruka-greske" class="error">Neispravan email ili lozinka.</div>
    
    <p>Nemate račun? <a href="user.html">Registrujte se</a></p>
</div>

<script>
async function izvrsiPrijavu() {
    const email = document.getElementById('email').value;
    const sifra = document.getElementById('password').value;
    const greskaDiv = document.getElementById('poruka-greske');

    if (!email || !sifra) {
        alert("Molimo popunite sva polja.");
        return;
    }

    try {
        const odgovor = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, sifra })
        });

        const podaci = await odgovor.json();

        if (odgovor.status === 200) {
            localStorage.setItem('trenutniUserId', podaci.userId);
            localStorage.setItem('trenutnoIme', podaci.fullName);
            
            window.location.href = 'projects.html';
        } else {
            greskaDiv.innerText = podaci.message || "Greška pri prijavi.";
            greskaDiv.style.display = 'block';
        }
    } catch (error) {
        console.error("Greška:", error);
        alert("Došlo je do greške na serveru.");
    }
}
</script>

</body>
</html>
